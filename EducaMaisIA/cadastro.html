<section class="banner">
    <h2>Cadastre-se Gratuitamente</h2>
    <p>Junte-se a milhares de alunos aprendendo com a EducaMais IA</p>
</section>

<form onsubmit="enviarCadastr(event)">
    <label for="nome">Nome Completo:</label>
    <input type="text" id="nome" name="nome" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <label for="telefone">Telefone:</label>
    <input type="tel" id="telefone" name="telefone">

    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha" required>

    <label for="confirmar">Confirmar Senha:</label>
    <input type="password" id="confirmar" name="confirmar" required>

    <label style="display: flex; align-items: center; gap: 0.5rem; margin: 1rem 0;">
        <input type="checkbox" required style="width: auto;">
        Aceito os termos de uso
    </label>

    <button type="submit" class="botao" style="width: 100%;">Cadastrar</button>

    <p style="text-align: center; margin-top: 1rem;">
        Já tem conta? <a href="login.html" style="color: #667eea; text-decoration: none;">Faça login</a>
    </p>
</form>
